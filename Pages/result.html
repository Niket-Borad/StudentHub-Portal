<html>

<head>
    <title>Student Result</title>
</head>

<body align="center" bgcolor="white">
<h1 style="background-color: #84a2e3; 
           color: white; 
           padding: 10px;">
    Student Result Portal
</h1>

<hr>
<form  action="resultpage.html" > 

    <label>Institute Name:</label>
    <select>
        <option>Select Institute</option>
        <option>DEPSTAR</option>
        <option>CSPIT</option>
        <option>PDPIAS</option>
        <option>CMPICA</option>
    </select>
<br><br>
    <label>Degree:</label>
    <select>
        <option>Select Degree</option>
        <option>Computer Engineering</option>
        <option>Information Technology</option>
        <option>Computer science & Technology</option>
        <option>Mechanical Engineering</option>
        <option>Electrical Engineering</option>
        <option>Civil Engineering</option>   
    </select>

    <br><br>
    <label>Semester:</label>

    <select>
        <option>Select Semester</option>
        <option>1st Semester</option>
        <option>2nd Semester</option>
        <option>3rd Semester</option>
        <option>4th Semester</option>
        <option>5th Semester</option>
        <option>6th Semester</option>
    </select>

    <br><br>

    <label>Exam Month:</label>

    <select>
        <option>Select Month</option>
        <option>January</option>
        <option>April</option>
        <option>June</option>
        <option>October</option>
        <option>December</option>
    </select>

    <br><br>
    <label>Student ID:</label>
    <input type="text">

    <br><br>
    <input type="submit" value="Show Result">

</form>
<br>
<a href="dashboard.html">Back to Dashboard</a>
</body>
</html>
