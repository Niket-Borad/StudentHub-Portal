<html>
<head>
   
    <title>Student Registration</title>
</head>

<body bgcolor="white">
<h1 align="center" style="background-color: #84a2e3; color: white; padding: 10px;">Student Registration</h1>
<hr>

<form align="center">
    <h2  align="center" style="background-color: #84a2e3; color: white; padding: 10px;">Student Information</h2>
    <label>Full Name:</label>
    <input type="text">
    <br><br>

    <label>Student ID:</label>
    <input type="text">
    <br><br>

    <label>Date of Birth:</label>
    <input type="date">
    <br><br>

    <label>Gender:</label>

    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <hr>

    <h2 style="background-color:#84a2e3; color:aliceblue;padding: 10px;">Contact Information</h2>
    <label>Mobile Number:</label>
    <input type="text">
    <br><br>

    <label>Email:</label>
    <input type="email">
    <br><br>

    <label>Address:</label>
    <br>

    <textarea rows="4" cols="30"></textarea>
    <hr>
    <h2 style="background-color: #84a2e3; color: white; padding: 10px;">Academic Information</h2>
    <label>Course:</label>

    <select>
        <option>Computer Engineering</option>
        <option>Information Technology</option>
        <option>Mechanical Engineering</option>
    </select>
    <br><br>

    <label>Year:</label>
    <select>
        <option>First Year</option>
        <option>Second Year</option>
        <option>Third Year</option>
        <option>Fourth Year</option>
    </select>
    <br><br>

    <label>Division:</label>
    <input type="text">
    <br><br>
    <input type="submit" value="Register">
    <input type="reset" value="Clear">
</form>
<br>

<a align="center" href="dashboard.html">Back to Dashboard</a>

</body>
</html>
